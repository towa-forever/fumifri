<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="文フリ">
<meta name="theme-color" content="#F5EDD6">
<link rel="manifest" href="/manifest.json">
<title>文フリ</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Hiragino Kaku Gothic ProN,sans-serif;background:#FDFAF4;color:#333;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px}
:root{--cr:#8B6914;--crl:#F5EDD6;--crm:#D4A843}
.topbar{background:var(--crl);border-bottom:1.5px solid var(--crm);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:18px;font-weight:700;color:var(--cr);flex:1}
.top-user-btn{font-size:13px;color:var(--cr);cursor:pointer;background:none;border:1px solid var(--crm);border-radius:20px;padding:5px 12px;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;font-family:inherit}
.tab-bar{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--crl);border-bottom:1px solid var(--crm);position:sticky;top:53px;z-index:99;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;min-width:72px;padding:10px 8px;text-align:center;font-size:13px;color:#999;cursor:pointer;border-bottom:2px solid transparent;user-select:none;white-space:nowrap}
.tab.active{color:var(--cr);border-bottom:2px solid var(--cr);font-weight:700}
.page{display:none;padding:8px 12px}
#tab-chat.active{display:flex;flex-direction:column;height:calc(100vh - 53px - 41px);padding:0}
.page.active{display:block}
.search-wrap{padding:10px 12px 4px}
.search-wrap input{width:100%;border:1px solid #ddd;border-radius:20px;padding:8px 16px;font-size:14px;background:#fff;outline:none}
.search-wrap input:focus{border-color:var(--crm)}
.cat-row{display:flex;gap:8px;padding:6px 12px 10px;overflow-x:auto}
.cat-row::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #ccc;cursor:pointer;background:#fff;color:#666;user-select:none;font-family:inherit}
.cat-btn.active{background:var(--cr);color:#fff;border-color:var(--cr)}
.product-grid{display:flex;flex-direction:column;gap:10px}
.pcard{background:#fff;border:1px solid #e8e0cc;border-radius:12px;overflow:hidden;cursor:pointer;display:flex}
.pcard.sold-card{opacity:.6}
.pcard-thumb{width:90px;height:90px;flex-shrink:0;background:var(--crl);display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden}
.pcard-thumb img{width:100%;height:100%;object-fit:cover}
.pcard-body{flex:1;min-width:0;padding:10px 12px}
.pcard-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-sub{font-size:11px;color:#999;margin:2px 0 5px}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700}
.b-cond{background:#E8F4E8;color:#2D7A2D}
.b-neg{background:#FFF3E0;color:#E65C00}
.b-fix{background:#F3E5F5;color:#7B1FA2}
.b-sold{background:#FFEBEE;color:#C62828}
.pcard-foot{display:flex;align-items:center;justify-content:space-between}
.pcard-price{font-size:15px;font-weight:700;color:var(--cr)}
.hoshii-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;font-size:12px;color:#bbb;padding:0;line-height:1;font-family:inherit}
.hoshii-btn.active{color:#e04060}
.hoshii-btn i{font-size:16px}
.fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--cr);color:#fff;border:none;font-size:26px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.3);z-index:200}
.fab.show{display:flex}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:300;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 12px 30px}
.modal-bg.open{display:block}
.modal{background:#fff;border-radius:16px;width:100%;max-width:440px;margin:0 auto;padding:20px}
.modal h2{font-size:16px;font-weight:700;margin-bottom:14px}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:12px;color:#999;margin-bottom:4px;font-weight:600}
.fr input,.fr select,.fr textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:14px;background:#fff;outline:none;color:#333;font-family:inherit}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--crm)}
.fr textarea{resize:vertical;min-height:70px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.toggle-row label{font-size:14px}
.toggle{width:44px;height:26px;border-radius:13px;background:#ccc;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--cr)}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn-p{flex:1;padding:10px;background:var(--cr);color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:700;font-family:inherit}
.btn-c{padding:10px 14px;background:none;border:1px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer;color:#666;font-family:inherit}
.btn-d{padding:10px 14px;background:#FFEBEE;border:none;border-radius:10px;font-size:14px;cursor:pointer;color:#C62828;font-weight:700;font-family:inherit}
.img-upload-area{border:2px dashed #ddd;border-radius:10px;height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:6px;color:#bbb;font-size:13px;position:relative;overflow:hidden}
.img-upload-area:hover{border-color:var(--crm)}
.img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload-area img.preview{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.img-upload-area .img-clear{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:2;font-family:inherit}
.img-upload-area i{font-size:28px}
.emoji-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.emoji-opt{font-size:22px;cursor:pointer;padding:4px 6px;border-radius:6px;border:2px solid transparent;line-height:1}
.emoji-opt.sel{border-color:var(--cr);background:var(--crl)}
.detail-img{width:100%;height:200px;background:var(--crl);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden;margin-bottom:14px}
.detail-img img{width:100%;height:100%;object-fit:contain;background:#fafafa}
.detail-name{font-size:18px;font-weight:700;margin-bottom:4px}
.detail-price{font-size:22px;font-weight:700;color:var(--cr);margin:8px 0}
.detail-desc{font-size:14px;color:#555;line-height:1.7;margin:8px 0 10px;white-space:pre-wrap}
.detail-owner{font-size:12px;color:#bbb;margin-bottom:12px}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.act-btn{background:none;border:1px solid #ddd;border-radius:10px;padding:8px 14px;cursor:pointer;font-size:13px;color:#555;display:flex;align-items:center;gap:5px;font-family:inherit}
.act-btn.hoshii-on{border-color:#e04060;color:#e04060;background:#FFF0F3}
.act-btn.notif-on{border-color:var(--cr);color:var(--cr);background:var(--crl)}
.hoshii-who{font-size:12px;color:#bbb;margin-bottom:14px;min-height:16px}
.cmt-section{border-top:1px solid #f0f0f0;padding-top:14px;margin-top:4px}
.cmt-section h3{font-size:13px;color:#999;margin-bottom:10px;font-weight:700}
.cmt-item{background:#F8F5F0;border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:13px}
.cmt-author{font-weight:700;color:var(--cr);font-size:12px;margin-bottom:2px}
.cmt-input-row{display:flex;gap:8px;margin-top:10px}
.cmt-input-row input{flex:1;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;outline:none;color:#333;font-family:inherit}
.cmt-input-row input:focus{border-color:var(--crm)}
.cmt-send{background:var(--cr);color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:14px;font-family:inherit}
.close-btn{background:none;border:none;cursor:pointer;font-size:22px;color:#999;line-height:1;padding:0}
.auth-wrap{padding:32px 20px 20px;text-align:center}
.auth-icon{font-size:52px;margin-bottom:14px;line-height:1}
.auth-wrap h2{font-size:20px;font-weight:700;margin-bottom:6px}
.auth-wrap p{font-size:14px;color:#999;margin-bottom:18px;line-height:1.6}
.auth-wrap input{width:100%;border:1px solid #ddd;border-radius:10px;padding:10px 14px;font-size:14px;margin-bottom:10px;outline:none;background:#fff;color:#333;font-family:inherit}
.auth-wrap input:focus{border-color:var(--crm)}
.auth-wrap .btn-p{width:100%;padding:12px;margin-top:4px}
.auth-toggle{font-size:13px;color:var(--cr);cursor:pointer;text-decoration:underline;display:block;margin-bottom:12px;background:none;border:none;font-family:inherit}
.auth-err{color:#C62828;font-size:13px;margin-top:8px;min-height:16px}
.prof-page{padding:20px}
.prof-avatar{width:80px;height:80px;border-radius:50%;background:var(--crl);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:38px;border:2px solid var(--crm)}
.prof-name{text-align:center;font-size:18px;font-weight:700;margin-bottom:4px}
.prof-bio{text-align:center;font-size:13px;color:#999;margin-bottom:20px}
.stat-row{display:flex;justify-content:center;gap:24px;margin-bottom:20px}
.stat-box{text-align:center}
.stat-num{font-size:24px;font-weight:700;color:var(--cr)}
.stat-lbl{font-size:11px;color:#999;margin-top:2px}
.sec-box{background:#fff;border:1px solid #eee;border-radius:12px;padding:14px;margin-bottom:12px}
.sec-box h3{font-size:13px;color:#999;margin-bottom:10px;font-weight:700}
.logout-btn{width:100%;padding:10px;background:none;border:1px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer;color:#999;font-family:inherit;margin-top:4px}
.notif-btn{width:100%;padding:10px;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:700;border:1px solid var(--crm);background:var(--crl);color:var(--cr)}
.notif-btn.on{background:var(--cr);color:#fff;border-color:var(--cr)}
.mini-pcard{background:#fff;border:1px solid #e8e0cc;border-radius:10px;padding:10px 12px;display:flex;gap:10px;cursor:pointer;margin-bottom:8px}
.mini-pcard-img{width:48px;height:48px;border-radius:6px;background:var(--crl);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.mini-pcard-img img{width:100%;height:100%;object-fit:cover}
.mini-pcard-body{flex:1;min-width:0}
.mini-pcard-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;padding:48px 20px;color:#ccc}
.empty i{font-size:48px;display:block;margin-bottom:12px}
.empty p{font-size:14px}
.loading{text-align:center;padding:40px;color:#bbb;font-size:14px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <span style="font-size:20px">✏️</span>
  <span class="topbar-title">文フリ</span>
  <button id="notif-bell-btn" onclick="toggleNotifPanel()" style="position:relative;background:none;border:none;font-size:20px;cursor:pointer;margin-left:auto;margin-right:6px">
    <i class="ti ti-bell"></i>
    <span id="notif-bell-badge" style="display:none;position:absolute;top:-2px;right:-4px;background:var(--cr);color:#fff;border-radius:10px;font-size:10px;padding:1px 5px;line-height:1.3"></span>
  </button>
  <button class="top-user-btn" id="top-user-btn">ログイン</button>
</div>
<div id="notif-panel" style="display:none;position:fixed;top:50px;right:8px;width:300px;max-height:70vh;overflow-y:auto;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:400;padding:10px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="font-weight:700;font-size:14px">通知</span>
    <button onclick="markAllNotifRead()" style="border:none;background:none;color:#999;font-size:12px;cursor:pointer">すべて既読</button>
  </div>
  <div id="notif-list"></div>
</div>
<div class="tab-bar">
  <div class="tab active" data-tab="home" id="tab-btn-home">🏠 ホーム</div>
  <div class="tab" data-tab="hoshii">❤️ ほしい！</div>
  <div class="tab" data-tab="memories">💭 思い出</div>
  <div class="tab" data-tab="chat">💬 チャット</div>
  <div class="tab" data-tab="feedback">💡 意見箱</div>
  <div class="tab" data-tab="profile">👤 プロフィール</div>
</div>

<div id="tab-home" class="page active">
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="🔍 商品名・説明で検索...">
  </div>
  <div class="cat-row" id="cat-row"></div>
  <div class="product-grid" id="product-grid"><div class="loading">読み込み中...</div></div>
</div>
<div id="tab-hoshii" class="page">
  <div class="product-grid" id="hoshii-grid" style="padding-top:8px"></div>
</div>
<div id="tab-memories" class="page">
  <div id="memory-composer" style="padding:12px"></div>
  <div id="memories-list" style="padding:0 12px"></div>
</div>
<div id="tab-chat" class="page">
  <div id="chat-messages" style="flex:1;overflow-y:auto;padding:12px"></div>
  <div id="chat-input-row" style="display:flex;gap:6px;padding:10px;border-top:1px solid #eee;background:#fff"></div>
</div>
<div id="tab-feedback" class="page">
  <div style="padding:12px">
    <div id="admin-toggle-row"></div>
    <p style="font-size:13px;color:#888;margin-bottom:10px">サイトをもっと良くするための意見・要望をなんでも書いてください！</p>
    <div id="feedback-composer" style="margin-bottom:14px"></div>
    <div id="feedback-list"></div>
  </div>
</div>
<div id="tab-profile" class="page">
  <button id="contracts-toggle-btn" onclick="toggleContractsList()" style="width:100%;display:flex;justify-content:space-between;align-items:center;background:#fafafa;border:none;border-radius:10px;padding:12px 14px;margin:16px 0 0;font-size:14px;font-weight:700;cursor:pointer">
    <span>📄 契約書一覧 <span id="contracts-unsigned-badge"></span></span>
    <i class="ti ti-chevron-down" id="contracts-chevron"></i>
  </button>
  <div id="contracts-list" style="display:none;margin-top:8px;margin-bottom:10px"></div>
  <div id="profile-content"></div>
</div>

<button class="fab" id="add-btn" aria-label="商品を追加">
  <i class="ti ti-plus"></i>
</button>
<div class="toast" id="toast"></div>

<!-- 認証 -->
<div class="modal-bg" id="auth-modal">
  <div class="modal">
    <div class="auth-wrap">
      <div class="auth-icon">📒</div>
      <h2 id="auth-title">文フリへようこそ</h2>
      <p id="auth-desc">アカウントを作って参加しよう</p>
      <input type="text" id="a-name" placeholder="ニックネーム" autocomplete="off">
      <div id="a-signup-fields">
        <input type="text" id="a-emoji" placeholder="アイコン絵文字（例: 🖊）" maxlength="2">
        <input type="text" id="a-bio" placeholder="ひとことメモ（任意）">
      </div>
      <input type="password" id="a-pass" placeholder="パスワード">
      <button class="auth-toggle" id="auth-toggle">すでにアカウントがある場合はこちら</button>
      <button class="btn-p" id="auth-submit">アカウント作成</button>
      <p class="auth-err" id="auth-err"></p>
    </div>
  </div>
</div>

<!-- 商品登録・編集 -->
<div class="modal-bg" id="add-modal">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h2 style="margin:0" id="form-title">商品を登録</h2>
      <button class="close-btn" onclick="closeModal('add-modal')"><i class="ti ti-x"></i></button>
    </div>
    <div class="fr">
      <label>商品画像（任意）</label>
      <div id="img-preview-row" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px"></div><div class="img-upload-area" id="img-upload-area" style="height:80px"><input type="file" id="f-img" accept="image/*" multiple onchange="onImgChange(this)"><i class="ti ti-camera-plus" id="img-ph-icon"></i><span id="img-ph-text">タップして画像を追加（最大20枚）</span></div>
    </div>
    <div class="fr">
      <label>アイコン（画像なし時に表示）</label>
      <div class="emoji-row" id="emoji-row"></div>
    </div>
    <div class="fr">
      <label>商品名 *</label>
      <input type="text" id="f-name" placeholder="例: ゼブラ サラサ 0.5mm 黒">
    </div>
    <div class="fr">
      <label>カテゴリ</label>
      <select id="f-cat"></select>
    </div>
    <div class="fr">
      <label>状態</label>
      <select id="f-cond">
        <option>新品・未使用</option>
        <option>ほぼ新品</option>
        <option>良い</option>
        <option>目立つ使用感あり</option>
      </select>
    </div>
    <div class="fr">
      <label>説明（状態・付属品など）</label>
      <textarea id="f-desc" placeholder="例: インク残量90%。傷なし。箱あり。"></textarea>
    </div>
    <div class="fr">
      <label>価格（円）*</label>
      <input type="number" id="f-price" placeholder="500" min="0">
    </div>
    <div class="toggle-row">
      <label>オークション形式にする</label>
      <button class="toggle" id="t-auction" type="button"></button>
    </div>
    <div id="auction-fields" style="display:none">
      <div class="fr">
        <label>開始日</label>
        <input type="date" id="f-auction-date" class="inp">
      </div>
      <div class="fr">
        <label>開始時間</label>
        <input type="time" id="f-auction-start" class="inp">
      </div>
      <div class="fr">
        <label>終了日</label>
        <input type="date" id="f-auction-enddate" class="inp">
      </div>
      <div class="fr">
        <label>終了時間</label>
        <input type="time" id="f-auction-endtime" class="inp">
      </div>
      <p style="font-size:12px;color:#999;margin:-4px 0 10px">※最大入札額は3万円です。</p>
    </div>
    <div class="toggle-row" id="neg-row">
      <label>値下げ交渉OK</label>
      <button class="toggle" id="t-neg" type="button"></button>
    </div>
    <div class="toggle-row" id="sold-row" style="display:none">
      <label>売り切れにする</label>
      <button class="toggle" id="t-sold" type="button"></button>
    </div>
    <div class="btn-row">
      <button class="btn-c" onclick="closeModal('add-modal')" type="button">キャンセル</button>
      <button class="btn-d" id="form-delete" style="display:none" type="button">削除</button>
      <button class="btn-p" id="form-save" type="button">登録する</button>
    </div>
  </div>
</div>

<!-- 商品詳細 -->
<div class="modal-bg" id="coupon-manager-modal" style="z-index:301">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h2>🎟️ クーポン管理</h2>
      <button class="close-btn" onclick="closeModal('coupon-manager-modal')"><i class="ti ti-x"></i></button>
    </div>
    <div id="coupon-manager-content"></div>
  </div>
</div>
<div class="modal-bg" id="contract-modal" style="z-index:301">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h2>📄 契約書</h2>
      <button class="close-btn" onclick="closeModal('contract-modal')"><i class="ti ti-x"></i></button>
    </div>
    <div id="contract-content"></div>

function compressImage(file, maxPx=800, quality=0.75){
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width*scale);
        canvas.height = Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
let pendingImgs = [];
function onImgChange(input){
  const files = Array.from(input.files);
  if(!files.length) return;
  const remaining = 20 - pendingImgs.length;
  if(remaining <= 0){ toast('画像は最大20枚です'); return; }
  files.slice(0, remaining).forEach(file => {
    compressImage(file).then(b64 => { pendingImgs.push(b64); renderImgPreview(); });
  });
}
function renderImgPreview(){
  const row = $('img-preview-row');
  if(!row) return;
  row.innerHTML = '';
  pendingImgs.forEach((b64, i) => {
    const wrap = document.createElement('div');
    wrap.style = 'position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;flex-shrink:0';
    const img = document.createElement('img');
    img.src = b64; img.style = 'width:100%;height:100%;object-fit:contain;background:#fafafa';
    const btn = document.createElement('button');
    btn.type = 'button'; btn.textContent = '×';
    btn.style = 'position:absolute;top:2px;right:2px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px';
    btn.onclick = () => { pendingImgs.splice(i,1); renderImgPreview(); };
    wrap.appendChild(img); wrap.appendChild(btn);
    row.appendChild(wrap);
  });
  $('img-ph-text').textContent = pendingImgs.length >= 20 ? '上限（20枚）に達しました' : 'タップして画像を追加（最大20枚）';
}

function initSlider(){
  const slider = document.getElementById('detail-img-slider');
  const inner = document.getElementById('slider-inner');
  if(!slider||!inner) return;
  const imgs = inner.querySelectorAll('img');
  if(imgs.length<=1) return;
  let cur=0, startX=0, isDragging=false;
  const go = (i) => {
    cur = Math.max(0, Math.min(imgs.length-1, i));
    inner.style.transform = `translateX(-${cur*100}%)`;
    document.querySelectorAll('.sdot').forEach((d,j)=>d.style.background=j===cur?'var(--cr)':'#ccc');
  };
  document.querySelectorAll('.sdot').forEach(d=>d.onclick=()=>go(parseInt(d.dataset.i)));
  slider.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; isDragging=true; },{passive:true});
  slider.addEventListener('touchend', e=>{
    if(!isDragging) return;
    const diff = startX - e.changedTouches[0].clientX;
    if(Math.abs(diff)>40) go(diff>0?cur+1:cur-1);
    isDragging=false;
  },{passive:true});
}

// ---- プッシュ通知 ----
function urlBase64ToUint8Array(b64){
  const pad = '='.repeat((4 - b64.length%4)%4);
  const base64 = (b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
}

async function toggleNotif(){
  if(!('Notification' in window)){ toast('このブラウザは通知非対応です'); return; }
  try{
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if(sub && Notification.permission === 'granted'){
      // オフにする
      await fetch('/api/unsubscribe', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({endpoint: sub.endpoint})
      });
      await sub.unsubscribe();
      toast('通知をオフにしました');
    } else {
      // オンにする
      const perm = await Notification.requestPermission();
      if(perm !== 'granted'){ toast('通知が許可されませんでした'); return; }
      const newSub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUB)
      });
      await api('POST', '/subscribe', newSub.toJSON());
      toast('通知をオンにしました！');
    }
    renderProfile();
  }catch(e){
    console.error(e);
    toast('エラー: ' + e.message);
  }
}

async function autoApplyCoupon(productId) {
  if (!loginUser) return;
  const p = products.find(x => x._id === productId);
  if (!p || p.owner === loginUser || p.sold) return;
  try {
    const res = await fetch('/api/coupons/auto?productId=' + productId + '&user=' + loginUser).then(r => r.json());
    if (res.error || !res.value) return;
    appliedCoupon = res;
    const disc = res.type === 'percent' ? Math.floor(p.price * res.value / 100) : res.value;
    const after = Math.max(0, p.price - disc);
    const el = document.getElementById('coupon-result');
    if (el) el.innerHTML = `<span style="color:green;font-weight:700">🎉 自動クーポン適用！-${res.type==='percent'?res.value+'%':res.value+'円'} → ¥${after.toLocaleString()}</span>`;
  } catch(e) {}
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg => {
    // 1分ごとに更新チェック
    setInterval(() => reg.update(), 60000);
    // 新しいSWが待機中になったら即適用
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if(newSW.state === 'installed' && navigator.serviceWorker.controller){
          newSW.postMessage({ type: 'SKIP_WAITING' });
          window.location.reload();
        }
      });
    });
  }).catch(e => console.error('SW error:', e));
  // コントローラーが変わったらリロード
  navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
}

let appliedCoupon = null;

async function applyCoupon(productId, price) {
  const code = document.getElementById('coupon-input').value.trim();
  if (!code) return toast('クーポンコードを入力してください');
  const res = await fetch('/api/coupons/apply', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code, productId, user: loginUser })
  }).then(r => r.json());
  if (res.error) return toast(res.error);
  appliedCoupon = res;
  const disc = res.type === 'percent' ? Math.floor(price * res.value / 100) : res.value;
  const after = Math.max(0, price - disc);
  document.getElementById('coupon-result').innerHTML =
    `<span style="color:green;font-weight:700">✅ -${res.type==='percent'?res.value+'%':res.value+'円'} 適用！ → ¥${after.toLocaleString()}</span>`;
}

  el.innerHTML = '<span style="color:#999">AIがクーポンを生成中...</span>';
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 100,
        messages: [{
          role: 'user',
          content: `文房具フリマアプリで「${productName}」が¥${price}で売られています。購入者へのお得なクーポン割引をJSON形式だけで答えてください。例: {"type":"percent","value":10,"reason":"初回購入特典"} typeはamount(円引き)かpercent(%OFF)、valueは数字のみ。`
        }]
      })
    });
    const data = await response.json();
    const text = data.content[0].text.replace(/```json|```/g, '').trim();
    const coupon = JSON.parse(text);
    appliedCoupon = coupon;
    const disc = coupon.type === 'percent' ? Math.floor(price * coupon.value / 100) : coupon.value;
    const after = Math.max(0, price - disc);
    el.innerHTML = `<span style="color:green;font-weight:700">🤖 AIクーポン適用！${coupon.reason || ''} -${coupon.type==='percent'?coupon.value+'%':coupon.value+'円'} → ¥${after.toLocaleString()}</span>`;
  } catch(e) {
    el.innerHTML = '<span style="color:red">AIクーポンの生成に失敗しました</span>';
  }
}

async function openCouponManager() {
  if (!loginUser) return openAuth();
  const coupons = await fetch('/api/coupons?owner=' + loginUser).then(r => r.json());
  const content = document.getElementById('coupon-manager-content');
  content.innerHTML = `
    <h3 style="font-size:14px;font-weight:700;margin-bottom:10px">新しいクーポンを発行</h3>
    <select id="new-coupon-product" class="inp" style="margin-bottom:6px">
      <option value="">商品を選んでください</option>
      ${products.filter(p=>p.owner===loginUser&&!p.sold).map(p=>`<option value="${p._id}">${p.emoji||'📦'} ${esc(p.name)} ¥${p.price.toLocaleString()}</option>`).join('')}
    </select>
    <input id="new-coupon-code" class="inp" placeholder="クーポンコード（例: SALE10）">
    <select id="new-coupon-type" class="inp" style="margin-top:6px">
      <option value="amount">円引き</option>
      <option value="percent">%OFF</option>
    </select>
    <input id="new-coupon-value" class="inp" type="number" placeholder="割引額（例: 100 or 10）" style="margin-top:6px">
    <input id="new-coupon-expiry" class="inp" type="date" style="margin-top:6px">
    <div style="margin-top:10px;padding:10px;background:#f8f8f8;border-radius:10px">
      <p style="font-size:13px;font-weight:700;margin-bottom:8px">クーポンの使い方</p>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px;cursor:pointer">
        <input type="radio" name="require-code" value="true" checked> コードを教えた人だけ使える
      </label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
        <input type="radio" name="require-code" value="false"> コード不要（商品を見た人に自動適用）
      </label>
    </div>
    <button class="btn-p" style="width:100%;margin-top:8px" onclick="issueCoupon()">発行する</button>
    <hr style="margin:14px 0">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:10px">発行済みクーポン</h3>
    ${coupons.length === 0 ? '<p style="color:#999;font-size:13px">まだクーポンはありません</p>' :
      coupons.map(c => `
        <div style="background:#fafafa;border-radius:10px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <p style="font-weight:700;font-size:14px">🎟️ ${c.code}</p>
            <p style="font-size:12px;color:#999">${c.type==='percent'?c.value+'%OFF':c.value+'円引き'} ${c.expiry?'期限:'+c.expiry:''}</p>
            <p style="font-size:12px;color:#999">使用済み: ${c.usedBy.length}人</p>
          </div>
          <button style="background:none;border:1px solid #eee;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;color:#e04060" onclick="deleteCoupon('${c._id}')">削除</button>
        </div>`).join('')}
  `;
  document.getElementById('coupon-manager-modal').classList.add('open');
}

async function issueCoupon() {
  const productId = document.getElementById('new-coupon-product').value;
  const code = document.getElementById('new-coupon-code').value.trim();
  const type = document.getElementById('new-coupon-type').value;
  const value = parseInt(document.getElementById('new-coupon-value').value);
  const expiry = document.getElementById('new-coupon-expiry').value;
  if (!productId) return toast('商品を選んでください');
  if (!code || !value) return toast('コードと割引額を入力してください');
  const res = await fetch('/api/coupons', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code, productId, owner: loginUser, type, value, expiry, requireCode: document.querySelector('input[name="require-code"]:checked').value === 'true' })
  }).then(r => r.json());
  if (res.error) return toast(res.error);
  toast('クーポンを発行しました！');
  openCouponManager();
}

async function deleteCoupon(id) {
  if (!confirm('このクーポンを削除しますか？')) return;
  const res = await fetch('/api/coupons/' + id, {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ requester: loginUser })
  }).then(r => r.json());
  if (res.error) return toast(res.error);
  toast('削除しました');
  openCouponManager();
}


// ---- オークション表示 ----
async function renderAuctionBox(productId) {
  const box = document.getElementById('auction-box');
  if (!box) return;
  const p = products.find(x => x._id === productId);
  if (!p) return;

  if (p.auctionStatus === 'scheduled') {
    box.innerHTML = `
      <p style="font-weight:700;font-size:14px;margin-bottom:6px">⏰ オークション開始予定</p>
      <p style="font-size:13px;color:#666">${p.auctionStartDate} ${p.auctionStartTime} 開始 / ${p.auctionEndDate||p.auctionStartDate} ${p.auctionEndTime} 終了</p>
    `;
    return;
  }

  if (p.auctionStatus === 'done') {
    box.innerHTML = `<p style="font-weight:700;font-size:14px;color:green">✅ オークション終了</p>${p.buyer?`<p style="font-size:13px;color:#666">落札者: ${esc(p.buyer)}</p>`:'<p style="font-size:13px;color:#999">入札なし、または成立しませんでした</p>'}`;
    return;
  }

  const data = await fetch('/api/products/' + productId + '/auction-current').then(r => r.json());

  if (p.auctionStatus === 'confirming') {
    const isCurrent = data.current && data.current.user === loginUser;
    box.innerHTML = `
      <p style="font-weight:700;font-size:14px;margin-bottom:6px">🔨 オークション終了！最終確認中</p>
      ${data.current ? `<p style="font-size:13px;color:#666;margin-bottom:8px">現在の最高額: <b>${esc(data.current.user)}</b> さん ¥${data.current.amount.toLocaleString()}</p>` : '<p style="font-size:13px;color:#999">入札がありませんでした</p>'}
      ${isCurrent ? `
        <p style="font-size:13px;margin-bottom:8px">あなたが最高額です！購入しますか？</p>
        <div style="display:flex;gap:8px">
          <button class="btn-p" style="flex:1" onclick="confirmAuctionBuy('${productId}', true)">購入する</button>
          <button class="btn-c" style="flex:1" onclick="confirmAuctionBuy('${productId}', false)">購入しない</button>
        </div>
      ` : isMineCheck(p) ? `<button class="btn-p" style="width:100%;margin-top:6px" onclick="nextAuctionWinner('${productId}')">次の人に進める（出品者用）</button>` : '<p style="font-size:12px;color:#999">落札者の回答を待っています...</p>'}
    `;
    return;
  }

  // open状態：入札一覧 + 入札フォーム
  const topBid = data.allBids[0];
  box.innerHTML = `
    <p style="font-weight:700;font-size:14px;margin-bottom:6px">🔨 オークション開催中</p>
    <p style="font-size:13px;color:#666;margin-bottom:8px">終了: ${(p.auctionEndDate||p.auctionStartDate||'')} ${p.auctionEndTime || ''}　${topBid ? '現在の最高額: ¥' + topBid.amount.toLocaleString() + '（' + esc(topBid.user) + 'さん）' : 'まだ入札がありません'}</p>
    ${session && p.owner !== session.name ? `
      <div style="display:flex;gap:6px">
        <input id="bid-amount-${productId}" type="number" class="inp" style="margin:0;flex:1" placeholder="入札額（〜30000円）" max="30000">
        <button class="btn-p" style="padding:8px 14px" onclick="submitBid('${productId}')">入札</button>
      </div>
    ` : ''}
  `;
}

function isMineCheck(p) {
  return session && p.owner === session.name;
}

async function confirmAuctionBuy(productId, accept) {
  if (accept && !confirm('本当に購入しますか？この後契約書を作成します。')) return;
  const res = await fetch('/api/products/' + productId + '/auction-confirm', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user: loginUser, accept })
  }).then(r => r.json());
  if (res.error) return toast(res.error);
  if (accept && res.decided) {
    toast('購入が確定しました！出品者が契約書を作成します');
    loadProducts();
    closeModal('detail-modal-bg');
  } else {
    toast('購入しない、を選択しました');
    loadProducts();
    closeModal('detail-modal-bg');
  }
}

async function nextAuctionWinner(productId) {
  if (!confirm('次の入札者に確認を進めますか？')) return;
  const res = await fetch('/api/products/' + productId + '/auction-next', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ requester: loginUser })
  }).then(r => r.json());
  if (res.error) return toast(res.error);
  toast(res.decided === false && res.message ? res.message : '次の人に進めました');
  renderAuctionBox(productId);
}
