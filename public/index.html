<!DOCTYPE html>
<html lang="ja">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Hiragino Kaku Gothic ProN,sans-serif;background:#FDFAF4;color:#333;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px}
:root{--cr:#8B6914;--crl:#F5EDD6;--crm:#D4A843}
.topbar{background:var(--crl);border-bottom:1.5px solid var(--crm);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:18px;font-weight:700;color:var(--cr);flex:1}
.top-user-btn{font-size:13px;color:var(--cr);cursor:pointer;background:none;border:1px solid var(--crm);border-radius:20px;padding:5px 12px;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;font-family:inherit}
.tab-bar{display:flex;background:var(--crl);border-bottom:1px solid var(--crm);position:sticky;top:53px;z-index:99}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:13px;color:#999;cursor:pointer;border-bottom:2px solid transparent;user-select:none}
.tab.active{color:var(--cr);border-bottom:2px solid var(--cr);font-weight:700}
.page{display:none;padding:8px 12px}
.page.active{display:block}
.search-wrap{padding:10px 12px 4px}
.search-wrap input{width:100%;border:1px solid #ddd;border-radius:20px;padding:8px 16px;font-size:14px;background:#fff;outline:none}
.search-wrap input:focus{border-color:var(--crm)}
.cat-row{display:flex;gap:8px;padding:6px 12px 10px;overflow-x:auto}
.cat-row::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #ccc;cursor:pointer;background:#fff;color:#666;user-select:none;font-family:inherit}
.cat-btn.active{background:var(--cr);color:#fff;border-color:var(--cr)}
.product-grid{display:flex;flex-direction:column;gap:10px}
.pcard{background:#fff;border:1px solid #e8e0cc;border-radius:12px;overflow:hidden;cursor:pointer;display:flex}
.pcard.sold-card{opacity:.6}
.pcard-thumb{width:90px;height:90px;flex-shrink:0;background:var(--crl);display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden}
.pcard-thumb img{width:100%;height:100%;object-fit:cover}
.pcard-body{flex:1;min-width:0;padding:10px 12px}
.pcard-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-sub{font-size:11px;color:#999;margin:2px 0 5px}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700}
.b-cond{background:#E8F4E8;color:#2D7A2D}
.b-neg{background:#FFF3E0;color:#E65C00}
.b-fix{background:#F3E5F5;color:#7B1FA2}
.b-sold{background:#FFEBEE;color:#C62828}
.pcard-foot{display:flex;align-items:center;justify-content:space-between}
.pcard-price{font-size:15px;font-weight:700;color:var(--cr)}
.hoshii-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;font-size:12px;color:#bbb;padding:0;line-height:1;font-family:inherit}
.hoshii-btn.active{color:#e04060}
.hoshii-btn i{font-size:16px}
.fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--cr);color:#fff;border:none;font-size:26px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.3);z-index:200}
.fab.show{display:flex}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:300;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 12px 30px}
.modal-bg.open{display:block}
.modal{background:#fff;border-radius:16px;width:100%;max-width:440px;margin:0 auto;padding:20px}
.modal h2{font-size:16px;font-weight:700;margin-bottom:14px}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:12px;color:#999;margin-bottom:4px;font-weight:600}
.fr input,.fr select,.fr textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:14px;background:#fff;outline:none;color:#333;font-family:inherit}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--crm)}
.fr textarea{resize:vertical;min-height:70px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.toggle-row label{font-size:14px}
.toggle{width:44px;height:26px;border-radius:13px;background:#ccc;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--cr)}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn-p{flex:1;padding:10px;background:var(--cr);color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:700;font-family:inherit}

.btn-d{padding:10px 14px;background:#FFEBEE;border:none;border-radius:10px;font-size:14px;cursor:pointer;color:#C62828;font-weight:700;font-family:inherit}
.img-upload-area{border:2px dashed #ddd;border-radius:10px;height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:6px;color:#bbb;font-size:13px;position:relative;overflow:hidden}

.emoji-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.emoji-opt{font-size:22px;cursor:pointer;padding:4px 6px;border-radius:6px;border:2px solid transparent;line-height:1}

.detail-img{width:100%;height:200px;background:var(--crl);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden;margin-bottom:14px}

.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.act-btn{background:none;border:1px solid #ddd;border-radius:10px;padding:8px 14px;cursor:pointer;font-size:13px;color:#555;display:flex;align-items:center;gap:5px;font-family:inherit}
.act-btn.hoshii-on{border-color:#e04060;color:#e04060;background:#FFF0F3}

.hoshii-who{font-size:12px;color:#bbb;margin-bottom:14px;min-height:16px}
.cmt-section{border-top:1px solid #f0f0f0;padding-top:14px;margin-top:4px}

.cmt-input-row input{flex:1;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;outline:none;color:#333;font-family:inherit}

.auth-wrap{padding:32px 20px 20px;text-align:center}

.auth-wrap p{font-size:14px;color:#999;margin-bottom:18px;line-height:1.6}
.auth-wrap input{width:100%;border:1px solid #ddd;border-radius:10px;padding:10px 14px;font-size:14px;margin-bottom:10px;outline:none;background:#fff;color:#333;font-family:inherit}
.auth-wrap input:focus{border-color:var(--crm)}

.auth-toggle{font-size:13px;color:var(--cr);cursor:pointer;text-decoration:underline;display:block;margin-bottom:12px;background:none;border:none;font-family:inherit}

.prof-page{padding:20px}
.prof-avatar{width:80px;height:80px;border-radius:50%;background:var(--crl);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:38px;border:2px solid var(--crm)}
.prof-name{text-align:center;font-size:18px;font-weight:700;margin-bottom:4px}
.prof-bio{text-align:center;font-size:13px;color:#999;margin-bottom:20px}
.stat-row{display:flex;justify-content:center;gap:24px;margin-bottom:20px}
.stat-box{text-align:center}
.stat-num{font-size:24px;font-weight:700;color:var(--cr)}
.stat-lbl{font-size:11px;color:#999;margin-top:2px}
.sec-box{background:#fff;border:1px solid #eee;border-radius:12px;padding:14px;margin-bottom:12px}
.sec-box h3{font-size:13px;color:#999;margin-bottom:10px;font-weight:700}
.logout-btn{width:100%;padding:10px;background:none;border:1px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer;color:#999;font-family:inherit;margin-top:4px}
.notif-btn{width:100%;padding:10px;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:700;border:1px solid var(--crm);background:var(--crl);color:var(--cr)}
.notif-btn.on{background:var(--cr);color:#fff;border-color:var(--cr)}
.mini-pcard{background:#fff;border:1px solid #e8e0cc;border-radius:10px;padding:10px 12px;display:flex;gap:10px;cursor:pointer;margin-bottom:8px}
.mini-pcard-img{width:48px;height:48px;border-radius:6px;background:var(--crl);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.mini-pcard-img img{width:100%;height:100%;object-fit:cover}
.mini-pcard-body{flex:1;min-width:0}
.mini-pcard-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;padding:48px 20px;color:#ccc}
.empty i{font-size:48px;display:block;margin-bottom:12px}
.empty p{font-size:14px}
.loading{text-align:center;padding:40px;color:#bbb;font-size:14px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">

</button>

<!-- 認証 -->

<!-- 商品登録・編集 -->
<div class="modal-bg" id="add-modal">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h2 style="margin:0" id="form-title">商品を登録</h2>
      <button class="close-btn" onclick="closeModal('add-modal')"><i class="ti ti-x"></i></button>

    <div class="fr">
      <label>商品画像（任意）</label>
      <div class="img-upload-area" id="img-upload-area">
        <input type="file" id="f-img" accept="image/*" onchange="onImgChange(this)">
        <i class="ti ti-camera-plus" id="img-ph-icon"></i>
        <span id="img-ph-text">タップして画像を追加</span>
      </div>
    </div>
    <div class="fr">
      <label>アイコン（画像なし時に表示）</label>

      <input type="text" id="f-name" placeholder="例: ゼブラ サラサ 0.5mm 黒">
    </div>
    <div class="fr">
      <label>カテゴリ</label>

    </div>
    <div class="fr">
      <label>状態</label>
      <select id="f-cond">
        <option>新品・未使用</option>
        <option>ほぼ新品</option>
        <option>良い</option>

      </select>
    </div>

      <textarea id="f-desc" placeholder="例: インク残量90%。傷なし。箱あり。"></textarea>

<!-- 商品詳細 -->
<div class="modal-bg" id="detail-modal-bg">
  <div class="modal" id="detail-modal"></div>
</div>

<script>
const CATS = ['全て','ペン・マーカー','ノート・紙','消しゴム・修正','ハサミ・テープ','スタンプ・シール','ファイル・バインダー','その他'];
const EMOJIS = ['✏️','🖊️','🖋️','📝','📒','📔','📓','📏','📐','✂️','📌','🖇️','🗂️','📎','🖍️'];
const VAPID_PUB = 'BIGF-lxkipVWSDRM9U_a3JgFG2aeItqcgE4P3Ol4MdEmEIUlLnINTWvKc0X0I6PJDMc8lNX93pZbanaxMMgI7QE';

let session = null;
let products = [];
let selCat = '全て';
let editId = null;
let selEmoji = EMOJIS[0];
let negOn = false;
let soldOn = false;
let pendingImg = null;

const $ = id => document.getElementById(id);

try { session = JSON.parse(localStorage.getItem('fumifri_session')); } catch(e){}
function saveSession(s){ session = s; localStorage.setItem('fumifri_session', JSON.stringify(s)); }
function clearSession(){ session = null; localStorage.removeItem('fumifri_session'); }

function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function api(method, path, body){
  const res = await fetch('/api' + path, {
    method,
    headers: {'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await res.json();
  if(!res.ok) throw new Error(data.error || 'エラー');
  return data;
}

// ---- 画像圧縮 ----
function compressImage(file, maxPx=800, quality=0.75){
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width*scale);
        canvas.height = Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function onImgChange(input){
  const file = input.files[0];
  if(!file) return;
  compressImage(file).then(b64 => { pendingImg = b64; renderImgPreview(b64); });
}
function renderImgPreview(b64){
  const area = $('img-upload-area');
  area.querySelector('img.preview')?.remove();
  area.querySelector('.img-clear')?.remove();
  if(b64){
    const img = document.createElement('img');
    img.className = 'preview'; img.src = b64;
    area.appendChild(img);
    const btn = document.createElement('button');
    btn.className = 'img-clear'; btn.type = 'button'; btn.textContent = '×';
    btn.onclick = e => { e.stopPropagation(); pendingImg = null; $('f-img').value = ''; renderImgPreview(null); };
    area.appendChild(btn);
    $('img-ph-icon').style.display = 'none';
    $('img-ph-text').style.display = 'none';
  } else {
    $('img-ph-icon').style.display = '';
    $('img-ph-text').style.display = '';
  }
}

// ---- カテゴリ ----
function renderCats(){
  const r = $('cat-row');
  r.innerHTML = '';
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat-btn' + (c === selCat ? ' active' : '');
    b.textContent = c;
    b.onclick = () => { selCat = c; renderCats(); renderFiltered(); };
    r.appendChild(b);
  });
}

// ---- バッジ ----
function updateBadge(){
  const last = parseInt(localStorage.getItem('fumifri_lastCount')||'0');
  const cur = products.length;
  const btn = $('tab-btn-home');
  if(cur > last && last > 0){
    btn.innerHTML = '🏠 ホーム <span style="background:#e04060;color:#fff;border-radius:10px;font-size:10px;padding:1px 5px">' + (cur-last) + '</span>';
  } else {
    btn.textContent = '🏠 ホーム';
  }
}
function clearBadge(){
  localStorage.setItem('fumifri_lastCount', products.length);
  $('tab-btn-home').textContent = '🏠 ホーム';
}

// ---- 商品一覧 ----
function getFiltered(){
  const q = ($('search-input')?.value||'').toLowerCase();
  return products.filter(p => {
    if(selCat !== '全て' && p.cat !== selCat) return false;
    if(q && !p.name.toLowerCase().includes(q) && !p.desc.toLowerCase().includes(q)) return false;
    return true;
  });
}

function cardHTML(p){
  const iH = session && p.hoshii.includes(session.name);
  return `<div class="pcard${p.sold?' sold-card':''}" onclick="openDetail('${p._id}')">
    <div class="pcard-thumb">${p.img?`<img src="${p.img}" alt="">`:(p.emoji||'📦')}</div>
    <div class="pcard-body">
      <div class="pcard-name">${esc(p.name)}</div>
      <div class="pcard-sub">${esc(p.cat)}</div>
      <div class="badges">
        <span class="badge b-cond">${esc(p.cond)}</span>
        ${p.neg?'<span class="badge b-neg">交渉OK</span>':'<span class="badge b-fix">価格固定</span>'}
        ${p.sold?'<span class="badge b-sold">売り切れ</span>':''}
      </div>
      <div class="pcard-foot">
        <div class="pcard-price">¥${p.price.toLocaleString()}</div>
        <button class="hoshii-btn${iH?' active':''}" onclick="toggleHoshii(event,'${p._id}')">
          <i class="ti ti-heart"></i> ${p.hoshii.length}
        </button>
      </div>
    </div>
  </div>`;
}

function renderFiltered(){
  const g = $('product-grid');
  const items = getFiltered();
  g.innerHTML = items.length ? items.map(cardHTML).join('') : '<div class="empty"><i class="ti ti-search"></i><p>商品が見つかりません</p></div>';
}

function renderHoshii(){
  const g = $('hoshii-grid');
  if(!session){ g.innerHTML='<div class="empty"><i class="ti ti-heart"></i><p>ログインするとほしい！リストが見られます</p></div>'; return; }
  const items = products.filter(p => p.hoshii.includes(session.name));
  g.innerHTML = items.length ? items.map(cardHTML).join('') : '<div class="empty"><i class="ti ti-heart"></i><p>ほしい！した商品がここに表示されます</p></div>';
}

async function loadProducts(){
  try{
    products = await api('GET', '/products');
    renderFiltered();
    renderHoshii();
    updateBadge();
  }catch(e){ $('product-grid').innerHTML='<div class="empty"><i class="ti ti-wifi-off"></i><p>読み込みに失敗しました</p></div>'; }
}

// ---- プロフィール ----
async function renderProfile(){
  const c = $('profile-content');
  if(!session){ c.innerHTML='<div class="empty" style="padding:60px 20px"><i class="ti ti-user"></i><p>ログインするとプロフィールが表示されます</p></div>'; return; }
  const myItems = products.filter(p => p.owner === session.name);

  // 通知状態確認
  let notifOn = false;
  let notifSupported = 'Notification' in window && 'serviceWorker' in navigator;
  if(notifSupported){
    try{
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      notifOn = !!sub && Notification.permission === 'granted';
    }catch(e){}
  }

  c.innerHTML = `<div class="prof-page">
    <div class="prof-avatar">${session.emoji}</div>
    <div class="prof-name">${esc(session.name)}</div>
    <div class="prof-bio">${esc(session.bio||'ひとことメモなし')}</div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num">${myItems.length}</div><div class="stat-lbl">出品数</div></div>
      <div class="stat-box"><div class="stat-num">${myItems.filter(p=>p.sold).length}</div><div class="stat-lbl">売り切れ</div></div>
      <div class="stat-box"><div class="stat-num">${products.filter(p=>p.hoshii.includes(session.name)).length}</div><div class="stat-lbl">ほしい！</div></div>
    </div>
    ${notifSupported ? `
    <button class="notif-btn${notifOn?' on':''}" id="notif-btn" onclick="toggleNotif()">
      <i class="ti ti-bell${notifOn?'-off':''}"></i>
      ${notifOn ? '通知をオフにする' : '新着通知をオンにする'}
    </button>` : ''}
    <div class="sec-box">
      <h3>出品中の商品</h3>
      ${myItems.length ? myItems.map(p=>`
        <div class="mini-pcard${p.sold?' sold-card':''}" onclick="openDetail('${p._id}')">
          <div class="mini-pcard-img">${p.img?`<img src="${p.img}" alt="">`:p.emoji||'📦'}</div>
          <div class="mini-pcard-body">
            <div class="mini-pcard-name">${esc(p.name)}</div>
            <div class="badges" style="margin-top:4px"><span class="badge b-cond">${esc(p.cond)}</span>${p.sold?'<span class="badge b-sold">売り切れ</span>':''}</div>
            <div style="font-size:13px;font-weight:700;color:var(--cr);margin-top:3px">¥${p.price.toLocaleString()}</div>
          </div>
        </div>`).join('') : '<p style="font-size:13px;color:#bbb">まだ出品していません</p>'}
    </div>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>`;
}

// ---- プッシュ通知 ----
function urlBase64ToUint8Array(b64){
  const pad = '='.repeat((4 - b64.length%4)%4);
  const base64 = (b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
}

async function toggleNotif(){
  if(!('Notification' in window)){ toast('このブラウザは通知非対応です'); return; }
  try{
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if(sub && Notification.permission === 'granted'){
      // オフにする
      await fetch('/api/unsubscribe', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({endpoint: sub.endpoint})
      });
      await sub.unsubscribe();
      toast('通知をオフにしました');
    } else {
      // オンにする
      const perm = await Notification.requestPermission();
      if(perm !== 'granted'){ toast('通知が許可されませんでした'); return; }
      const newSub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUB)
      });
      await api('POST', '/subscribe', newSub.toJSON());
      toast('通知をオンにしました！');
    }
    renderProfile();
  }catch(e){
    console.error(e);
    toast('エラー: ' + e.message);
  }
}

// ---- ほしい！ ----
async function toggleHoshii(e, id){
  e.stopPropagation();
  if(!session){ openAuth(); return; }
  try{
    const { hoshii } = await api('POST', `/products/${id}/hoshii`, {user: session.name});
    const p = products.find(x => x._id === id);
    if(p) p.hoshii = hoshii;
    renderFiltered(); renderHoshii();
  }catch(e){ toast('エラーが発生しました'); }
}

// ---- 詳細 ----
function openDetail(id){
  const p = products.find(x => x._id === id);
  if(!p) return;
  const iH = session && p.hoshii.includes(session.name);
  const isMine = session && p.owner === session.name;
  const who = p.hoshii.length
    ? `<span style="color:#e04060;font-weight:700">❤️ ${p.hoshii.map(n=>esc(n)).join(', ')}（${p.hoshii.length}人）がほしい！</span>`
    : 'まだ「ほしい！」はいません';
  $('detail-modal').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
      <button class="close-btn" onclick="closeModal('detail-modal-bg')"><i class="ti ti-x"></i></button>
    </div>
    <div class="detail-img">${p.img?`<img src="${p.img}" alt="">`:p.emoji||'📦'}</div>
    <div class="detail-name">${esc(p.name)}</div>
    <div style="font-size:12px;color:#aaa;margin-bottom:4px">${esc(p.cat)}</div>
    <div class="badges" style="margin:6px 0 4px">
      <span class="badge b-cond">${esc(p.cond)}</span>
      ${p.neg?'<span class="badge b-neg">交渉OK</span>':'<span class="badge b-fix">価格固定</span>'}
      ${p.sold?'<span class="badge b-sold">売り切れ</span>':''}
    </div>
    <div class="detail-price">¥${p.price.toLocaleString()}</div>
    <div class="detail-desc">${esc(p.desc)}</div>
    <div class="detail-owner"><i class="ti ti-user" style="font-size:13px;vertical-align:-2px"></i> 出品者: ${esc(p.owner)}</div>
    <div class="detail-actions">
      <button class="act-btn${iH?' hoshii-on':''}" onclick="toggleHoshiiD('${p._id}')">
        <i class="ti ti-heart"></i> ${iH?'ほしい！済':'ほしい！'}（${p.hoshii.length}）
      </button>
      ${isMine?`<button class="act-btn" onclick="openEdit('${p._id}')"><i class="ti ti-edit"></i> 編集</button>`:''}
      <button class="act-btn" onclick="shareP('${p._id}')"><i class="ti ti-share"></i> シェア</button>
    </div>
    <div class="hoshii-who">${who}</div>
    <div class="cmt-section">
      <h3><i class="ti ti-message-circle" style="font-size:14px;vertical-align:-2px"></i> コメント（${p.comments.length}）</h3>
      ${p.comments.length
        ? p.comments.map(c=>`<div class="cmt-item"><div class="cmt-author">${esc(c.user)}</div>${esc(c.text)}</div>`).join('')
        : '<p style="font-size:13px;color:#ccc;margin-bottom:8px">コメントはまだありません</p>'}
      ${session
        ? `<div class="cmt-input-row">
            <input type="text" id="cmt-input" placeholder="コメントを入力..." onkeydown="if(event.key==='Enter')sendCmt('${p._id}')">
            <button class="cmt-send" onclick="sendCmt('${p._id}')"><i class="ti ti-send"></i></button>
           </div>`
        : '<p style="font-size:12px;color:#bbb;margin-top:8px">コメントするにはログインが必要です</p>'}
    </div>`;
  $('detail-modal-bg').classList.add('open');
}

async function toggleHoshiiD(id){
  if(!session){ openAuth(); return; }
  try{
    const { hoshii } = await api('POST', `/products/${id}/hoshii`, {user: session.name});
    const p = products.find(x => x._id === id);
    if(p) p.hoshii = hoshii;
    openDetail(id); renderFiltered(); renderHoshii();
  }catch(e){ toast('エラーが発生しました'); }
}

async function sendCmt(id){
  if(!session) return;
  const inp = $('cmt-input');
  if(!inp?.value.trim()) return;
  try{
    const comments = await api('POST', `/products/${id}/comments`, {user: session.name, text: inp.value.trim()});
    const p = products.find(x => x._id === id);
    if(p) p.comments = comments;
    openDetail(id);
  }catch(e){ toast('エラーが発生しました'); }
}

function shareP(id){
  const p = products.find(x => x._id === id);
  if(!p) return;
  const text = `【文フリ】${p.emoji||''} ${p.name} ¥${p.price}${p.neg?' 交渉OK':''}`;
  if(navigator.share) navigator.share({title:'文フリ',text}).catch(()=>{});
  else navigator.clipboard?.writeText(text).then(()=>toast('クリップボードにコピーしました！'));
}

// ---- 認証 ----
let authIsLogin = false;
function openAuth(isLogin=false){
  authIsLogin = isLogin; updateAuthUI();
  $('a-name').value=''; $('a-pass').value=''; $('a-emoji').value=''; $('a-bio').value=''; $('auth-err').textContent='';
  $('auth-modal').classList.add('open');
}
function updateAuthUI(){
  $('auth-title').textContent = authIsLogin ? 'ログイン' : '文フリへようこそ';
  $('auth-desc').textContent = authIsLogin ? 'ログインして参加しよう' : 'アカウントを作って参加しよう';
  $('auth-submit').textContent = authIsLogin ? 'ログイン' : 'アカウント作成';
  $('auth-toggle').textContent = authIsLogin ? '新規アカウントを作成はこちら' : 'すでにアカウントがある場合はこちら';
  $('a-signup-fields').style.display = authIsLogin ? 'none' : 'block';
}
$('auth-toggle').onclick = () => { authIsLogin = !authIsLogin; updateAuthUI(); };
$('auth-submit').onclick = async () => {
  const name = $('a-name').value.trim();
  const pass = $('a-pass').value;
  $('auth-err').textContent = '';
  if(!name||!pass){ $('auth-err').textContent = '名前とパスワードを入力してください'; return; }
  try{
    const body = authIsLogin ? {name,pass} : {name,pass,emoji:$('a-emoji').value.trim()||'✏️',bio:$('a-bio').value.trim()};
    const user = await api('POST', authIsLogin?'/login':'/register', body);
    saveSession(user);
    closeModal('auth-modal');
    applySession();
  }catch(e){ $('auth-err').textContent = e.message; }
};
$('auth-modal').onclick = e => { if(e.target===$('auth-modal') && session) closeModal('auth-modal'); };

function logout(){ clearSession(); applySession(); }
function applySession(){
  $('top-user-btn').textContent = session ? session.emoji+' '+session.name : 'ログイン';
  if(session) $('add-btn').classList.add('show'); else $('add-btn').classList.remove('show');
  renderHoshii(); renderProfile();
}
$('top-user-btn').onclick = () => { if(!session) openAuth(false); };

// ---- フォーム ----
function setupForm(){
  const er = $('emoji-row');
  er.innerHTML = '';
  EMOJIS.forEach(e => {
    const s = document.createElement('span');
    s.className = 'emoji-opt'+(e===selEmoji?' sel':'');
    s.textContent = e;
    s.onclick = () => { selEmoji = e; setupForm(); };
    er.appendChild(s);
  });
  const fc = $('f-cat');
  fc.innerHTML = '';
  CATS.filter(c=>c!=='全て').forEach(c => { const o=document.createElement('option'); o.textContent=c; fc.appendChild(o); });
  $('t-neg').className = 'toggle'+(negOn?' on':'');
  $('t-sold').className = 'toggle'+(soldOn?' on':'');
}
$('t-neg').onclick = () => { negOn=!negOn; $('t-neg').className='toggle'+(negOn?' on':''); };
$('t-sold').onclick = () => { soldOn=!soldOn; $('t-sold').className='toggle'+(soldOn?' on':''); };

$('add-btn').onclick = () => {
  if(!session){ openAuth(); return; }
  editId=null; selEmoji=EMOJIS[0]; negOn=false; soldOn=false; pendingImg=null;
  $('form-title').textContent='商品を登録';
  $('f-name').value=''; $('f-desc').value=''; $('f-price').value='';
  $('form-save').textContent='登録する';
  $('form-delete').style.display='none';
  $('sold-row').style.display='none';
  $('f-img').value=''; renderImgPreview(null);
  setupForm(); $('add-modal').classList.add('open');
};

function openEdit(id){
  closeModal('detail-modal-bg');
  const p = products.find(x=>x._id===id);
  if(!p) return;
  editId=id; selEmoji=p.emoji||EMOJIS[0]; negOn=p.neg; soldOn=p.sold; pendingImg=p.img||null;
  $('form-title').textContent='商品を編集';
  $('f-name').value=p.name; $('f-desc').value=p.desc; $('f-price').value=p.price;
  $('form-save').textContent='保存する';
  $('form-delete').style.display='block';
  $('sold-row').style.display='flex';
  $('f-img').value=''; renderImgPreview(pendingImg);
  setupForm();
  setTimeout(()=>{ $('f-cat').value=p.cat; $('f-cond').value=p.cond; },50);
  $('add-modal').classList.add('open');
}

$('form-save').onclick = async () => {
  const name = $('f-name').value.trim();
  const price = parseInt($('f-price').value);
  if(!name){ toast('商品名を入力してください'); return; }
  if(!price||price<0){ toast('価格を入力してください'); return; }
  const data = {name,cat:$('f-cat').value,cond:$('f-cond').value,desc:$('f-desc').value.trim(),price,neg:negOn,emoji:selEmoji,img:pendingImg};
  try{
    if(editId){
      const updated = await api('PUT', `/products/${editId}`, {...data,sold:soldOn,requester:session.name});
      const i = products.findIndex(x=>x._id===editId);
      if(i>-1) products[i]=updated;
      toast('更新しました');
    } else {
      const created = await api('POST', '/products', {...data,owner:session.name});
      products.unshift(created);
      toast('登録しました');
    }
    closeModal('add-modal'); renderFiltered(); renderProfile();
  }catch(e){ toast(e.message); }
};

$('form-delete').onclick = async () => {
  if(!editId||!confirm('この商品を削除しますか？')) return;
  try{
    await api('DELETE', `/products/${editId}`, {requester:session.name});
    products = products.filter(x=>x._id!==editId);
    closeModal('add-modal'); renderFiltered(); renderProfile();
    toast('削除しました');
  }catch(e){ toast(e.message); }
};

function closeModal(id){ $(id).classList.remove('open'); }
$('add-modal').onclick = e => { if(e.target===$('add-modal')) closeModal('add-modal'); };
$('detail-modal-bg').onclick = e => { if(e.target===$('detail-modal-bg')) closeModal('detail-modal-bg'); };

// ---- タブ ----
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    $('tab-'+t.dataset.tab).classList.add('active');
    if(t.dataset.tab==='hoshii') renderHoshii();
    if(t.dataset.tab==='profile') renderProfile();
    if(t.dataset.tab==='home') clearBadge();
  };
});

$('search-input').addEventListener('input', renderFiltered);
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ---- Service Worker ----
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(e => console.error('SW error:', e));
}

// ---- 起動 ----
if(!session) openAuth(false);
applySession();
renderCats();
loadProducts();
setInterval(loadProducts, 30000);
</script>
